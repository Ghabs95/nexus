name: nexus-prod

services:
  bot:
    build:
      context: ../nexus-core/examples/telegram-bot
      dockerfile: Dockerfile
    image: nexus-bot:local
    command: ["python", "src/telegram_bot.py"]
    working_dir: /app
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      PROJECT_CONFIG_PATH: /app/config/project_config.yaml
      PYTHONUNBUFFERED: "1"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./config:/app/config:ro
      - ${BASE_DIR:-/home/ubuntu/git}:${BASE_DIR:-/home/ubuntu/git}

  processor:
    image: nexus-bot:local
    depends_on:
      - bot
    command: ["python", "src/inbox_processor.py"]
    working_dir: /app
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      PROJECT_CONFIG_PATH: /app/config/project_config.yaml
      PYTHONUNBUFFERED: "1"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./config:/app/config:ro
      - ${BASE_DIR:-/home/ubuntu/git}:${BASE_DIR:-/home/ubuntu/git}

  webhook:
    image: nexus-bot:local
    command: ["python", "src/webhook_server.py"]
    working_dir: /app
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      PROJECT_CONFIG_PATH: /app/config/project_config.yaml
      WEBHOOK_PORT: "8081"
      PYTHONUNBUFFERED: "1"
    ports:
      - "8081:8081"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./config:/app/config:ro
      - ${BASE_DIR:-/home/ubuntu/git}:${BASE_DIR:-/home/ubuntu/git}

  health:
    image: nexus-bot:local
    depends_on:
      - bot
      - processor
    command: ["python", "src/health_check.py"]
    working_dir: /app
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      PROJECT_CONFIG_PATH: /app/config/project_config.yaml
      HEALTH_CHECK_PORT: "8080"
      HEALTH_CHECK_HOST: "0.0.0.0"
      PYTHONUNBUFFERED: "1"
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./config:/app/config:ro
      - ${BASE_DIR:-/home/ubuntu/git}:${BASE_DIR:-/home/ubuntu/git}
