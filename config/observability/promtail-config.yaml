server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: nexus-docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 10s
    pipeline_stages:
      - docker: {}
    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        regex: '/(nexus-(telegram|discord|processor|webhook|health)-[0-9]+)'
        action: keep
      - source_labels: ['__meta_docker_container_name']
        regex: '/(nexus-[^-]+)-[0-9]+'
        target_label: service
      - source_labels: ['__meta_docker_container_name']
        regex: '/(nexus-[^/]+)'
        target_label: container
      - source_labels: ['__meta_docker_container_log_stream']
        target_label: stream
      - target_label: job
        replacement: nexus-docker
  - job_name: infra-docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 10s
    pipeline_stages:
      - docker: {}
    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        regex: '/(nexus-(loki|grafana|promtail)-[0-9]+)'
        action: keep
      - target_label: service
        replacement: infra
      - source_labels: ['__meta_docker_container_name']
        regex: '/nexus-([^-]+)-[0-9]+'
        target_label: component
      - source_labels: ['__meta_docker_container_name']
        regex: '/(nexus-[^/]+)'
        target_label: container
      - source_labels: ['__meta_docker_container_log_stream']
        target_label: stream
      - target_label: job
        replacement: infra-docker
