  workspace: ghabs
  git_repo: Ghabs95/nexus-core
  git_repos:
    - Ghabs95/nexus-core
    - Ghabs95/nexus
  operation_agents:
    default: triage
    chat:
      designer:
        context_path: ghabs/nexus-core/examples/telegram-bot/docs
        context_files:
          - AGENTS.md
      triage: {}
