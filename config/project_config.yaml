# Global workflow definition path (YAML workflow file - single source of truth)
workflow_definition_path: ghabs/agents/workflows/ghabs_org_workflow.yaml

# Shared agent YAML definitions (org-level agents used across all projects)
# Searched as fallback when agent_type is not found in project-specific agents_dir
shared_agents_dir: ghabs/agents/workflows/agents

# VCS-agnostic inbox/tasks directory (can be .nexus, .gitlab, .gitea, etc.)
# Relative to project workspace root
nexus_dir: .nexus

# Project key registry (single source of truth for short keys and aliases)
projects:
  casit:
    code: case_italia
    aliases: []
  wlbl:
    code: wallible
    aliases: []
  bm:
    code: biome
    aliases: []
  nxs:
    code: nexus
    aliases:
      - nexus core
      - nexus-core

# Merge queue behavior (project-level enforcement)
# review_mode:
#   - manual: PR merge requires human approval
#   - auto: PR can be merged automatically by the queue worker when ready
merge_queue:
  review_mode: manual

# Global model profiles and AI tool preferences.
# model_profiles define concrete model IDs per provider for each profile.
# ai_tool_preferences map agent_type -> {profile, provider}.
# provider can be: copilot, gemini, codex, auto.
#
# Architecture:
# 1. Agent YAML files define: spec.agent_type (e.g., "triage", "debug", "escalation")
# 2. Tasks are routed to agent types (not specific agent names)
# 3. The first available agent with that type handles the task
# 4. This config maps type → AI tool, so all agents of that type use the same tool
model_profiles:
  fast:
    copilot: gpt-4o-mini
    gemini: gemini-3.0-flash
    codex: gpt-5-mini
    # ollama: llama3.1:8b  # Uncomment to enable local fallback
  reasoning:
    copilot: gpt-5.3-codex
    gemini: gemini-3.1-pro
    codex: gpt-5.3-codex
    # ollama: deepseek-coder-v2:16b  # Uncomment to enable local fallback

profile_provider_priority:
  fast: [gemini, copilot, codex, ollama]
  reasoning: [codex, copilot, gemini, ollama]

ai_tool_preferences:
  # Most agents rely on fallback priority (provider: auto)
  # Lock specific agents to a provider if they require specific capabilities
  triage: {profile: fast, provider: auto}         # Lightweight classification task
  developer: {profile: reasoning, provider: auto} # Code implementation
  reviewer: {profile: reasoning, provider: auto}  # Code/quality review
  debug: {profile: reasoning, provider: copilot}  # Root-cause analysis
  designer: {profile: fast, provider: gemini}     # UX/UI and product design
  compliance: {profile: fast, provider: copilot}  # Checklist-style security review
  deployer: {profile: fast, provider: copilot}    # Mechanical deployment steps
  docs: {profile: fast, provider: gemini}         # Docs and summaries
  writer: {profile: fast, provider: auto}         # Close-loop writing
  finalizer: {profile: fast, provider: auto}      # Rejected/closure handling
  transcriber: {profile: fast, provider: whisper} # Audio processing

# Global operation task -> agent type mapping.
# Provider is selected through ai_tool_preferences for that agent type.
system_operations:
  default: triage
  inbox: triage
  classify: triage
  route: triage
  detect_intent: triage
  generate_name: triage
  refine_description: triage
  transcribe_audio: transcriber
  overrides:
    issue:
      refine_description: triage

# Project configurations
case_italia:
  agents_dir: ghabs/agents/casit-agents
  workspace: case_italia
  git_repo: Ghabs95/agents
  system_operations:
    default: triage
    chat:
      business: {}
      marketing: {}
      triage: {}
      developer: {}
      reviewer: {}
      compliance: {}
      deployer: {}
      designer: {}
      docs: {}

wallible:
  agents_dir: wallible/wlbl-workflow-os/agents
  workflow_definition_path: wallible/wlbl-workflow-os/workflows/master.yaml
  workspace: wallible
  git_platform: gitlab
  git_repo: wallible/wlbl-workflow-os
  git_repos:
    - wallible/wlbl-ecos
    - wallible/wlbl-app
    - wallible/wlbl-business-os
    - wallible/wlbl-marketing-os
    - wallible/wlbl-workflow-os
  system_operations:
    default: triage
    launch: triage
    chat:
      ceo: {}
      business:
        context_path: wlbl-business-os
        context_files:
          - AGENTS.md
          - README.md
          - WORKFLOWS.md
      marketing:
        context_path: wlbl-marketing-os
        context_files:
          - AGENTS.md
          - README.md
          - WORKFLOWS.md
      cto: {}
  # Wallible-specific overrides (inherits global model_profiles and profile_provider_priority)
  ai_tool_preferences:
    # Wallible execs get locked to Gemini reasoning
    ceo: {profile: reasoning, provider: gemini}     # Vision and scope approval
    cto: {profile: reasoning, provider: gemini}     # Strategic technical feasibility
    # Others use auto for fallbacks
    business: {profile: reasoning, provider: auto}  # Business strategy
    marketing: {profile: reasoning, provider: auto} # GTM and growth
    architect: {profile: reasoning, provider: auto} # System design and architecture
    compliance: {profile: fast, provider: copilot}  # Security and privacy audits
    developer: {profile: reasoning, provider: auto}
    deployer: {profile: fast, provider: copilot}
    designer: {profile: fast, provider: gemini}
    triage: {profile: fast, provider: auto}
    reviewer: {profile: reasoning, provider: auto}
    docs: {profile: fast, provider: gemini}

biome:
  agents_dir: ghabs/agents/bm-agents
  workspace: biome
  git_repo: Ghabs95/agents
  system_operations:
    default: triage
    chat:
      business: {}
      marketing: {}
      triage: {}
      developer: {}
      reviewer: {}
      compliance: {}
      deployer: {}
      designer: {}
      docs: {}

nexus:
  agents_dir: ghabs/nexus-core/examples/agents
  workspace: ghabs
  git_repo: Ghabs95/nexus-core
  git_repos:
    - Ghabs95/nexus-core
    - Ghabs95/nexus
  system_operations:
    default: triage
    chat:
      designer:
        context_path: ghabs/nexus-core/examples/nexus-bot/docs
        context_files:
          - AGENTS.md
      triage: {}
      compliance: {}
      writer: {}
  # Uses the enterprise workflow (multi-tier: full/shortened/fast-track)
  workflow_definition_path: ghabs/nexus-core/examples/workflows/enterprise_workflow.yaml
  # Nexus-specific overrides (inherits global profiles, defines custom preferences)
  ai_tool_preferences:
    triage: {profile: fast, provider: copilot}
    designer: {profile: reasoning, provider: codex}
    debug: {profile: fast, provider: copilot}
    developer: {profile: reasoning, provider: auto}
    reviewer: {profile: reasoning, provider: copilot}
    compliance: {profile: fast, provider: copilot}
    deployer: {profile: fast, provider: copilot}
    writer: {profile: fast, provider: auto}
    finalizer: {profile: fast, provider: auto}
