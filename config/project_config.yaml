    developer: copilot                   # Code implementation
    deployer: copilot["gpt-4o-mini"]     # Deployment and ops
    compliance: copilot["gpt-4o-mini"]   # Security and privacy audits
    designer: gemini                     # UX/UI and product design
    triage: copilot["gpt-4o-mini"]       # Intake and routing
    reviewer: copilot                    # Code/quality review
